<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .links a { display: inline-block; margin-right: 10px; color: #007bff; text-decoration: none; font-size: 14px; }
        .present { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="app">
    <h2>Connecting...</h2>
    <p>If this stays for more than 5 seconds, check your SQL Editor in Supabase.</p>
</div>

<script>
    const S_URL = "https://xytfdcqemvjmriitieyi.supabase.co";
    const S_KEY = "PASTE_YOUR_ANON_KEY_HERE"; // <--- PUT YOUR KEY HERE
    const supabase = supabase.createClient(S_URL, S_KEY);

    async function start() {
        const app = document.getElementById('app');
        try {
            // Test the connection
            const { data: users, error } = await supabase.from('attendance').select('*');
            if (error) throw error;

            if (users.length < 5) {
                app.innerHTML = `
                    <h2>Company Signup</h2>
                    <p>${users.length}/5 Roles Active</p>
                    <input id="n" placeholder="Full Name">
                    <select id="r">
                        <option>CEO</option><option>VICE PRESIDENT</option>
                        <option>STOCK HANDLER</option><option>LAWYER</option><option>EMPLOYEE</option>
                    </select>
                    <input id="p" type="password" placeholder="Password">
                    <button onclick="save()">Register</button>
                `;
            } else {
                const today = new Date().toDateString();
                app.innerHTML = `
                    <h2>Attendance</h2>
                    ${users.map(u => `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>${u.role}</span>
                            <span class="${u.last_marked === today ? 'present' : ''}">${u.last_marked === today ? '✓' : '...'}</span>
                        </div>
                    `).join('')}
                    <input id="lp" type="password" placeholder="Enter password">
                    <button onclick="mark()">Mark Present</button>
                    <div class="links" style="margin-top:20px;">
                        <a href="https://medai.vercel.app">Med AI</a>
                        <a href="https://uniai.vercel.app">Uni AI</a>
                    </div>
                `;
            }
        } catch (e) {
            app.innerHTML = `<h2 style="color:red">Setup Error</h2><p>${e.message}</p><p>Check if the table 'attendance' exists in your Supabase dashboard.</p>`;
        }
    }

    async function save() {
        const name = document.getElementById('n').value;
        const role = document.getElementById('r').value;
        const pass = document.getElementById('p').value;
        const { error } = await supabase.from('attendance').insert([{ name, role, pass, last_marked: "" }]);
        if (error) alert(error.message); else start();
    }

    async function mark() {
        const pass = document.getElementById('lp').value;
        const today = new Date().toDateString();
        const { data, error } = await supabase.from('attendance').update({ last_marked: today }).eq('pass', pass).select();
        if (data && data.length > 0) { alert("Done!"); start(); } else { alert("Wrong Password"); }
    }

    start();
</script>
</body>
</html>
